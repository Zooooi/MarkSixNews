<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <title>Facebook Link</title>
  <style>
    body {
      background-color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
    }
    .link {
      display: flex;
      align-items: center;
      text-decoration: none;
      color: #666666;
      font-size: 18px;
    }
    .link img {
      width: 32px;
      height: 32px;
      margin-right: 10px;
    }
  </style>
</head>
<body>
  <a class="link" href="https://facebook.com/TouSukStudio" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook Icon">
    Tou Suk Studio
  </a>
</body>
</html>
